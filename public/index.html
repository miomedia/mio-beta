<style>
/* ═══════════════════════════════════════════════════════
   DESIGN TOKENS — NIGHT (default) & DAY themes
═══════════════════════════════════════════════════════ */
:root {
  --transition-theme: 1.8s cubic-bezier(.4,0,.2,1);

  /* NIGHT */
  --sky-top:       #000005;
  --sky-mid:       #04041a;
  --sky-bot:       #07072e;
  --card-bg:       rgba(12,10,38,0.72);
  --card-border:   rgba(139,92,246,0.25);
  --card-shadow:   0 8px 40px rgba(0,0,0,0.6);
  --glass-blur:    blur(18px);
  --text-primary:  #f0edff;
  --text-secondary:#b8b0e0;
  --text-tertiary: #7b72a8;
  --accent:        #a78bfa;
  --accent2:       #38bdf8;
  --accent3:       #f472b6;
  --accent-glow:   rgba(167,139,250,0.4);
  --btn-primary:   linear-gradient(135deg,#7c3aed,#a855f7,#38bdf8);
  --btn-danger:    linear-gradient(135deg,#dc2626,#ef4444);
  --btn-success:   linear-gradient(135deg,#059669,#10b981);
  --input-bg:      rgba(15,10,50,0.6);
  --input-border:  rgba(139,92,246,0.35);
  --input-focus:   rgba(167,139,250,0.5);
  --nav-bg:        rgba(4,3,20,0.92);
  --header-bg:     rgba(4,3,20,0.90);
  --border-color:  rgba(139,92,246,0.2);
  --like-color:    #f472b6;
  --verified-bg:   #38bdf8;
  --music-color:   #4ade80;
  --danger:        #ef4444;
  --success:       #10b981;
  --warning:       #f59e0b;
  --chat-me:       linear-gradient(135deg,#7c3aed,#a855f7);
  --chat-them:     rgba(30,20,70,0.8);
  --chat-me-text:  #fff;
  --chat-them-text:#f0edff;
}

[data-theme="day"] {
  --sky-top:       #a8d8f0;
  --sky-mid:       #c9e8f7;
  --sky-bot:       #e8f4fc;
  --card-bg:       rgba(255,255,255,0.72);
  --card-border:   rgba(124,58,237,0.18);
  --card-shadow:   0 8px 40px rgba(100,80,200,0.12);
  --glass-blur:    blur(18px);
  --text-primary:  #1e1540;
  --text-secondary:#4c3d8a;
  --text-tertiary: #8b7cb5;
  --accent:        #7c3aed;
  --accent2:       #0ea5e9;
  --accent3:       #db2777;
  --accent-glow:   rgba(124,58,237,0.25);
  --btn-primary:   linear-gradient(135deg,#7c3aed,#a855f7,#0ea5e9);
  --input-bg:      rgba(255,255,255,0.75);
  --input-border:  rgba(124,58,237,0.28);
  --input-focus:   rgba(124,58,237,0.35);
  --nav-bg:        rgba(255,255,255,0.88);
  --header-bg:     rgba(255,255,255,0.85);
  --border-color:  rgba(124,58,237,0.15);
  --chat-me:       linear-gradient(135deg,#7c3aed,#6d28d9);
  --chat-them:     rgba(240,235,255,0.9);
  --chat-them-text:#1e1540;
}

/* ═══════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ══════════════════════════════════════════════════════
   FIX UTAMA: html & body harus transparan supaya
   #skyCanvas (div) yang jadi background terlihat
══════════════════════════════════════════════════════ */
html, body {
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Nunito',sans-serif;
  background:transparent; /* PENTING: jangan biarkan default putih */
}

/* ═══════════════════════════════════════════════════════
   SKY CANVAS BACKGROUND — INI DIV, BUKAN CANVAS
   Letaknya fixed fullscreen di belakang semua layer
═══════════════════════════════════════════════════════ */
#skyCanvas {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  /* Night default — gelap pekat */
  background: linear-gradient(180deg, #000005 0%, #04041a 50%, #07072e 100%);
  transition: background var(--transition-theme);
  z-index:0;
}

/* Saat tema day, sky berubah ke warna biru langit */
[data-theme="day"] #skyCanvas {
  background: linear-gradient(180deg, #a8d8f0 0%, #c9e8f7 50%, #e8f4fc 100%);
}

/* Stars layer (night only) */
#starsLayer{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  opacity:1;transition:opacity var(--transition-theme);
}
[data-theme="day"] #starsLayer{opacity:0}

/* Meteor canvas */
#meteorCanvas{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  opacity:1;transition:opacity var(--transition-theme);
}
[data-theme="day"] #meteorCanvas{opacity:0}

/* ═══════════════════════════════════════════════════════
   MOON (night)
═══════════════════════════════════════════════════════ */
.moon{
  position:fixed;top:60px;right:60px;z-index:3;
  width:70px;height:70px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle at 35% 35%,#fff9e6,#f5e6a3,#d4b84a);
  box-shadow:0 0 30px rgba(245,230,160,0.6),0 0 60px rgba(245,230,160,0.3),0 0 100px rgba(245,230,160,0.15);
  opacity:1;transition:opacity var(--transition-theme),transform var(--transition-theme);
  animation:moonFloat 8s ease-in-out infinite;
}
[data-theme="day"] .moon{opacity:0;transform:translateY(-20px)}

@keyframes moonFloat{
  0%,100%{transform:translateY(0) rotate(-5deg)}
  50%{transform:translateY(-8px) rotate(5deg)}
}

.moon::before{
  content:'';position:absolute;top:18px;left:12px;
  width:14px;height:14px;border-radius:50%;
  background:rgba(180,140,30,0.4);box-shadow:20px 15px 0 8px rgba(180,140,30,0.25),8px 30px 0 4px rgba(180,140,30,0.2);
}

/* ═══════════════════════════════════════════════════════
   SUN (day)
═══════════════════════════════════════════════════════ */
.sun{
  position:fixed;top:50px;right:70px;z-index:3;
  width:80px;height:80px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,#fff7a0,#ffd700,#ff8c00);
  box-shadow:0 0 40px rgba(255,200,0,0.8),0 0 80px rgba(255,150,0,0.5),0 0 120px rgba(255,100,0,0.25);
  opacity:0;transition:opacity var(--transition-theme),transform var(--transition-theme);
  transform:translateY(-20px);
  animation:sunFloat 10s ease-in-out infinite;
}
[data-theme="day"] .sun{opacity:1;transform:translateY(0)}

@keyframes sunFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

.sun::before,.sun::after{
  content:'';position:absolute;inset:-30px;border-radius:50%;
  background:conic-gradient(from 0deg,transparent 0deg,rgba(255,200,0,0.15) 10deg,transparent 20deg,rgba(255,200,0,0.15) 30deg,transparent 40deg,rgba(255,200,0,0.15) 50deg,transparent 60deg,rgba(255,200,0,0.15) 70deg,transparent 80deg,rgba(255,200,0,0.15) 90deg,transparent 100deg,rgba(255,200,0,0.15) 110deg,transparent 120deg,rgba(255,200,0,0.15) 130deg,transparent 140deg,rgba(255,200,0,0.15) 150deg,transparent 160deg,rgba(255,200,0,0.15) 170deg,transparent 180deg,rgba(255,200,0,0.15) 190deg,transparent 200deg,rgba(255,200,0,0.15) 210deg,transparent 220deg,rgba(255,200,0,0.15) 230deg,transparent 240deg,rgba(255,200,0,0.15) 250deg,transparent 260deg,rgba(255,200,0,0.15) 270deg,transparent 280deg,rgba(255,200,0,0.15) 290deg,transparent 300deg,rgba(255,200,0,0.15) 310deg,transparent 320deg,rgba(255,200,0,0.15) 330deg,transparent 340deg,rgba(255,200,0,0.15) 350deg,transparent 360deg);
  animation:sunRays 12s linear infinite;
}
.sun::after{inset:-50px;opacity:.5;animation-duration:20s;animation-direction:reverse}
@keyframes sunRays{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════════════════
   CLOUDS (day)
═══════════════════════════════════════════════════════ */
.clouds-layer{
  position:fixed;inset:0;z-index:3;pointer-events:none;
  opacity:0;transition:opacity var(--transition-theme);
}
[data-theme="day"] .clouds-layer{opacity:1}

.cloud{
  position:absolute;border-radius:50px;
  background:rgba(255,255,255,0.85);
  filter:blur(2px);
  animation:cloudDrift linear infinite;
}
.cloud::before,.cloud::after{
  content:'';position:absolute;background:inherit;border-radius:50%;
}
.cloud-1{width:180px;height:55px;top:12%;left:-200px;animation-duration:45s;animation-delay:-10s}
.cloud-1::before{width:80px;height:70px;top:-30px;left:30px}
.cloud-1::after{width:60px;height:55px;top:-20px;left:90px}
.cloud-2{width:130px;height:40px;top:22%;left:-150px;animation-duration:60s;animation-delay:-25s;opacity:.7}
.cloud-2::before{width:60px;height:55px;top:-25px;left:20px}
.cloud-2::after{width:50px;height:40px;top:-15px;left:65px}
.cloud-3{width:220px;height:65px;top:8%;left:-250px;animation-duration:75s;animation-delay:-40s;opacity:.6}
.cloud-3::before{width:100px;height:85px;top:-38px;left:40px}
.cloud-3::after{width:75px;height:65px;top:-25px;left:110px}
@keyframes cloudDrift{
  from{transform:translateX(-10%)}
  to{transform:translateX(calc(100vw + 300px))}
}

/* ═══════════════════════════════════════════════════════
   RAIN LAYER (day)
═══════════════════════════════════════════════════════ */
.rain-layer{
  position:fixed;inset:0;z-index:4;pointer-events:none;
  opacity:0;transition:opacity var(--transition-theme);
  overflow:hidden;
}
[data-theme="day"] .rain-layer{opacity:1}

#rainCanvas{
  position:absolute;inset:0;width:100%;height:100%;
}

.ripple-pool{
  position:absolute;bottom:0;left:0;right:0;height:80px;
  pointer-events:none;overflow:hidden;
}
.ripple{
  position:absolute;bottom:8px;border-radius:50%;
  border:1px solid rgba(120,180,255,0.45);
  animation:rippleExpand linear forwards;
  opacity:0;
}
@keyframes rippleExpand{
  0%  {transform:scale(0);opacity:0.65}
  100%{transform:scale(1);opacity:0}
}

/* ═══════════════════════════════════════════════════════
   AURORA (night extra touch)
═══════════════════════════════════════════════════════ */
.aurora{
  position:fixed;bottom:0;left:0;right:0;height:35%;z-index:2;pointer-events:none;
  background:linear-gradient(to top,rgba(16,185,129,0.06) 0%,rgba(167,139,250,0.04) 50%,transparent 100%);
  opacity:1;transition:opacity var(--transition-theme);
  animation:auroraShift 15s ease-in-out infinite;
}
[data-theme="day"] .aurora{opacity:0}
@keyframes auroraShift{
  0%,100%{background:linear-gradient(to top,rgba(16,185,129,0.06),rgba(167,139,250,0.04),transparent)}
  33%{background:linear-gradient(to top,rgba(56,189,248,0.06),rgba(167,139,250,0.05),transparent)}
  66%{background:linear-gradient(to top,rgba(167,139,250,0.07),rgba(244,114,182,0.04),transparent)}
}

/* ═══════════════════════════════════════════════════════
   MAIN APP SHELL
═══════════════════════════════════════════════════════ */
#app{
  position:relative;z-index:10;
  width:100%;height:100%;
  display:flex;flex-direction:column;
  background:transparent;
}

/* ═══════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
═══════════════════════════════════════════════════════ */
.toast-wrap{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{
  background:var(--card-bg);border:1px solid var(--card-border);
  backdrop-filter:var(--glass-blur);
  border-radius:18px;padding:14px 18px;
  display:flex;align-items:center;gap:10px;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;
  color:var(--text-primary);max-width:320px;pointer-events:all;
  box-shadow:var(--card-shadow);
  animation:toastIn .35s cubic-bezier(.34,1.56,.64,1);
}
.toast.success{border-color:rgba(16,185,129,.5);box-shadow:0 0 20px rgba(16,185,129,.2)}
.toast.error  {border-color:rgba(239,68,68,.5); box-shadow:0 0 20px rgba(239,68,68,.2)}
.toast.warning{border-color:rgba(245,158,11,.5);box-shadow:0 0 20px rgba(245,158,11,.2)}
.toast-close{background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:18px;margin-left:auto;opacity:.7;transition:.2s}
.toast-close:hover{opacity:1}
@keyframes toastIn{from{opacity:0;transform:translateX(30px) scale(.9)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateX(30px) scale(.9)}}

/* ═══════════════════════════════════════════════════════
   LOADING OVERLAY
═══════════════════════════════════════════════════════ */
.loading-overlay{
  position:fixed;inset:0;z-index:9998;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:.3s;
}
.loading-overlay.active{opacity:1;visibility:visible}
.loader-ring{
  width:56px;height:56px;border-radius:50%;
  border:4px solid rgba(167,139,250,.2);
  border-top-color:var(--accent);
  border-right-color:var(--accent2);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════ */
header{
  background:var(--header-bg);
  backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--border-color);
  padding:12px 18px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;z-index:100;
  transition:background var(--transition-theme),border-color var(--transition-theme);
}
.logo{
  font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:2px;
  background:var(--btn-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;cursor:pointer;
}
[data-theme="night"] .logo{filter:drop-shadow(0 0 10px rgba(167,139,250,.5))}
.header-right{display:flex;align-items:center;gap:12px}
.avatar-sm{
  width:38px;height:38px;border-radius:50%;object-fit:cover;
  border:2px solid var(--accent);
  box-shadow:0 0 12px var(--accent-glow);
  cursor:pointer;transition:.3s;
}
.avatar-sm:hover{transform:scale(1.1);box-shadow:0 0 20px var(--accent-glow)}

/* Day/Night toggle button */
.theme-btn{
  position:relative;width:62px;height:32px;
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:20px;cursor:pointer;transition:.4s;
  backdrop-filter:var(--glass-blur);overflow:hidden;
}
.theme-btn-knob{
  position:absolute;top:3px;left:3px;
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  transition:.4s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
[data-theme="night"] .theme-btn-knob{
  left:33px;
  background:linear-gradient(135deg,#a78bfa,#38bdf8);
}
.theme-btn-day,.theme-btn-night{
  position:absolute;top:50%;transform:translateY(-50%);font-size:13px;
  transition:opacity .3s;
}
.theme-btn-day{left:7px}
.theme-btn-night{right:7px}
[data-theme="day"] .theme-btn-night{opacity:0}
[data-theme="night"] .theme-btn-day{opacity:0}

.logout-btn{
  padding:6px 16px;border-radius:30px;border:1px solid var(--accent);
  background:transparent;color:var(--accent);font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:.3s;
  letter-spacing:.5px;
}
.logout-btn:hover{background:var(--accent);color:#fff;box-shadow:0 0 15px var(--accent-glow)}

/* ═══════════════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════════════ */
main{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px;
  -webkit-overflow-scrolling:touch;
  transition:background var(--transition-theme);
}
main::-webkit-scrollbar{width:4px}
main::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px;opacity:.5}

/* ═══════════════════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════════════════ */
.bottom-nav{
  display:flex;background:var(--nav-bg);
  backdrop-filter:var(--glass-blur);
  border-top:1px solid var(--border-color);
  padding:8px 0 calc(env(safe-area-inset-bottom,0px) + 8px);
  justify-content:space-around;flex-shrink:0;
  position:relative;z-index:100;
  transition:background var(--transition-theme),border-color var(--transition-theme);
}
.nav-btn{
  background:none;border:none;font-size:22px;padding:8px 18px;
  border-radius:40px;color:var(--text-tertiary);cursor:pointer;
  transition:.3s;position:relative;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.nav-btn span{font-size:9px;font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:.5px;color:inherit}
.nav-btn.active{color:var(--accent)}
[data-theme="night"] .nav-btn.active{
  text-shadow:0 0 10px var(--accent);
  filter:drop-shadow(0 0 6px var(--accent));
}
.nav-btn.active::before{
  content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);
  width:30px;height:3px;border-radius:3px;background:var(--accent);
  box-shadow:0 0 8px var(--accent);
}
.nav-badge{
  position:absolute;top:2px;right:6px;
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:#fff;font-size:9px;font-weight:800;
  min-width:18px;height:18px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
  border:2px solid var(--nav-bg);
  box-shadow:0 0 8px rgba(239,68,68,.5);
}

/* ═══════════════════════════════════════════════════════
   GLASS CARD
═══════════════════════════════════════════════════════ */
.glass{
  background:var(--card-bg);
  backdrop-filter:var(--glass-blur);
  border:1px solid var(--card-border);
  border-radius:24px;
  box-shadow:var(--card-shadow);
  transition:background var(--transition-theme),border-color var(--transition-theme),box-shadow var(--transition-theme);
}
.glass:hover{box-shadow:var(--card-shadow),0 0 0 1px var(--accent-glow)}

/* ═══════════════════════════════════════════════════════
   BUTTON STYLES
═══════════════════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 22px;border-radius:30px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  transition:.3s;letter-spacing:.5px;
}
.btn-primary{background:var(--btn-primary);color:#fff}
.btn-primary:hover{transform:scale(1.04);box-shadow:0 4px 20px var(--accent-glow)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn-ghost:hover{background:var(--accent);color:#fff;box-shadow:0 0 16px var(--accent-glow)}
.btn-danger{background:var(--btn-danger);color:#fff}
.btn-success{background:var(--btn-success);color:#fff}
.btn-sm{padding:7px 16px;font-size:12px}

/* ═══════════════════════════════════════════════════════
   INPUT STYLES
═══════════════════════════════════════════════════════ */
.inp{
  width:100%;padding:13px 18px;border-radius:16px;
  background:var(--input-bg);color:var(--text-primary);
  border:1px solid var(--input-border);
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:500;
  transition:.3s;outline:none;
  transition:background var(--transition-theme),border-color var(--transition-theme),color var(--transition-theme);
}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow),0 0 20px rgba(167,139,250,.1)}
.inp::placeholder{color:var(--text-tertiary)}
textarea.inp{resize:none}

.field-err{color:var(--danger);font-size:12px;font-weight:600;padding:4px 6px;display:none}
.field-err.show{display:block}

/* ═══════════════════════════════════════════════════════
   AUTH PAGE
═══════════════════════════════════════════════════════ */
.auth-wrap{max-width:420px;margin:30px auto;}
.auth-logo-big{text-align:center;margin-bottom:28px;}
.auth-logo-big h1{
  font-family:'Orbitron',monospace;font-size:28px;font-weight:900;letter-spacing:3px;
  background:var(--btn-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;
}
[data-theme="night"] .auth-logo-big h1{filter:drop-shadow(0 0 15px rgba(167,139,250,.6))}
.auth-logo-big p{color:var(--text-secondary);font-size:14px}
.auth-box{padding:32px 28px}
.auth-box h2{
  font-family:'Orbitron',monospace;font-size:20px;font-weight:700;
  color:var(--text-primary);margin-bottom:24px;text-align:center;letter-spacing:1px;
}
.auth-field{margin-bottom:16px}
.auth-field label{display:block;font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;letter-spacing:.5px}
.auth-toggle{
  text-align:center;margin-top:20px;color:var(--accent);
  font-weight:700;cursor:pointer;font-size:14px;
  transition:.3s;
}
.auth-toggle:hover{text-shadow:0 0 10px var(--accent)}
.auth-remember{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer}
.auth-remember input{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}

/* ═══════════════════════════════════════════════════════
   VERIFIED / ADMIN BADGE
═══════════════════════════════════════════════════════ */
.vbadge{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:#fff;font-size:11px;font-weight:900;
  margin-left:5px;flex-shrink:0;
  box-shadow:0 0 10px rgba(56,189,248,.5);
  animation:vPulse 3s ease-in-out infinite;
  cursor:default;
}
@keyframes vPulse{0%,100%{box-shadow:0 0 10px rgba(56,189,248,.5)}50%{box-shadow:0 0 18px rgba(56,189,248,.8),0 0 30px rgba(56,189,248,.3)}}
.abadge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;margin-left:6px;
  background:linear-gradient(135deg,#f472b6,#a855f7);color:#fff;
  font-size:11px;font-weight:800;letter-spacing:.5px;
  box-shadow:0 0 12px rgba(244,114,182,.4);
}
.cbadge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;
  font-size:10px;font-weight:700;margin-left:4px;
}

/* ═══════════════════════════════════════════════════════
   POST CARD
═══════════════════════════════════════════════════════ */
.feed-wrap{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.post-card{overflow:hidden;cursor:pointer;transition:.3s}
.post-card:hover{transform:translateY(-3px);box-shadow:var(--card-shadow),0 0 30px rgba(167,139,250,.15)}
.post-head{
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:.2s;
}
.post-head:hover{background:rgba(167,139,250,.05)}
.post-avatar{
  width:42px;height:42px;border-radius:50%;object-fit:cover;
  border:2px solid var(--accent);box-shadow:0 0 10px var(--accent-glow);flex-shrink:0;
}
.post-uname{font-weight:800;font-size:15px;color:var(--text-primary);display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.post-time{font-size:12px;color:var(--text-tertiary);margin-top:2px}
.following-chip{
  font-size:10px;font-weight:700;color:var(--accent2);
  background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.3);
  padding:2px 8px;border-radius:10px;
}
.post-media-wrap{
  width:100%;background:#000;position:relative;
  display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
  scrollbar-width:none;
}
.post-media-wrap::-webkit-scrollbar{display:none}
.media-slide{flex:0 0 100%;scroll-snap-align:start;position:relative}
.post-img,.post-vid{width:100%;max-height:460px;object-fit:contain;display:block}
.media-counter{
  position:absolute;top:12px;right:12px;
  background:rgba(0,0,0,.65);color:#fff;
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);
}
.media-dots{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;background:rgba(0,0,0,.4);padding:6px 12px;border-radius:20px;backdrop-filter:blur(8px);
}
.mdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:.3s}
.mdot.active{width:20px;border-radius:10px;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.music-pill{
  position:absolute;bottom:48px;right:12px;
  background:rgba(0,0,0,.75);color:var(--music-color);
  padding:6px 14px;border-radius:30px;font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:6px;cursor:pointer;
  border:1px solid var(--music-color);
  box-shadow:0 0 12px rgba(74,222,128,.3);
  backdrop-filter:blur(8px);transition:.3s;
}
.music-pill:hover{background:var(--music-color);color:#000;transform:scale(1.05)}
.post-caption{padding:12px 16px;font-size:14px;color:var(--text-primary);line-height:1.55}
.post-actions{
  padding:10px 16px;border-top:1px solid var(--border-color);
  display:flex;gap:6px;
}
.action-btn{
  background:none;border:none;cursor:pointer;color:var(--text-secondary);
  padding:7px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  display:flex;align-items:center;gap:6px;transition:.3s;
}
.action-btn:hover{background:rgba(167,139,250,.1);color:var(--accent);transform:scale(1.05)}
.action-btn.liked{color:var(--like-color)}
[data-theme="night"] .action-btn.liked{text-shadow:0 0 10px var(--like-color)}

/* ═══════════════════════════════════════════════════════
   EXPLORE
═══════════════════════════════════════════════════════ */
.explore-wrap{max-width:600px;margin:0 auto}
.search-box{padding:16px;margin-bottom:16px;}
.explore-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.exp-item{
  aspect-ratio:1;background:#000;overflow:hidden;cursor:pointer;
  position:relative;border-radius:14px;transition:.3s;
}
.exp-item:hover{transform:scale(1.04);z-index:2;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.exp-item img,.exp-item video{width:100%;height:100%;object-fit:cover}
.exp-badge{
  position:absolute;top:6px;right:6px;
  background:rgba(0,0,0,.7);color:#fff;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700;
  backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);
}

/* ═══════════════════════════════════════════════════════
   SEARCH RESULTS
═══════════════════════════════════════════════════════ */
.search-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.search-item{
  display:flex;align-items:center;gap:14px;padding:14px;cursor:pointer;transition:.3s;
}
.search-item:hover{transform:translateX(6px);background:rgba(167,139,250,.06)}
.search-item img{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);box-shadow:0 0 10px var(--accent-glow);flex-shrink:0}
.search-item strong{font-size:15px;color:var(--text-primary);display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.search-item small{font-size:12px;color:var(--text-tertiary);margin-top:3px;display:block}

/* ═══════════════════════════════════════════════════════
   PROFILE
═══════════════════════════════════════════════════════ */
.profile-wrap{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.profile-card{overflow:hidden}
.profile-wall{height:160px;position:relative;overflow:hidden}
.profile-wall video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.profile-wall-img{width:100%;height:100%;background-size:cover;background-position:center}
.profile-body{
  padding:0 20px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;
  background:linear-gradient(to bottom,transparent,var(--card-bg) 25%);
  position:relative;z-index:2;
}
.profile-ava-wrap{position:relative;display:inline-block;margin-top:-48px}
.profile-ava{
  width:92px;height:92px;border-radius:50%;object-fit:cover;
  border:3px solid var(--accent);
  box-shadow:0 0 20px var(--accent-glow),0 4px 20px rgba(0,0,0,.4);
}
.profile-vsticker{
  position:absolute;bottom:0;right:0;
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  border:3px solid var(--card-bg);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:900;
  box-shadow:0 0 12px rgba(56,189,248,.6);
  animation:vPulse 3s ease-in-out infinite;
}
.profile-name-row{display:flex;align-items:center;flex-wrap:wrap;justify-content:center;gap:4px;margin-top:10px}
.profile-uname{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--text-primary)}
[data-theme="night"] .profile-uname{text-shadow:0 0 15px var(--accent-glow)}
.profile-bio{color:var(--text-secondary);font-size:14px;margin:8px 0;max-width:320px;line-height:1.5}

.level-bar-wrap{
  background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);
  border-radius:30px;padding:10px 18px;margin:10px 0;width:100%;max-width:260px;
}
.level-bar-top{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:6px}
.level-track{height:8px;background:rgba(255,255,255,.1);border-radius:6px;overflow:hidden}
.level-fill{height:100%;background:var(--btn-primary);border-radius:6px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}

.profile-stats{display:flex;justify-content:center;gap:10px;margin:14px 0;flex-wrap:wrap}
.stat-chip{
  display:flex;flex-direction:column;align-items:center;padding:10px 18px;
  border-radius:20px;background:rgba(167,139,250,.08);border:1px solid var(--border-color);cursor:pointer;transition:.3s;
}
.stat-chip:hover{background:rgba(167,139,250,.15);transform:translateY(-2px)}
.stat-num{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--text-primary)}
.stat-lbl{font-size:11px;color:var(--text-tertiary);font-weight:700;margin-top:2px}
.profile-btns{display:flex;gap:10px;margin-top:4px;width:100%;max-width:300px}

/* ═══════════════════════════════════════════════════════
   POSTS GRID
═══════════════════════════════════════════════════════ */
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.grid-item{
  aspect-ratio:1;overflow:hidden;cursor:pointer;
  position:relative;border-radius:14px;transition:.3s;background:#000;
}
.grid-item:hover{transform:scale(1.05);z-index:2;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.grid-item img,.grid-item video{width:100%;height:100%;object-fit:cover}

/* ═══════════════════════════════════════════════════════
   UPLOAD
═══════════════════════════════════════════════════════ */
.upload-wrap{max-width:520px;margin:0 auto}
.upload-box{padding:28px}
.upload-box h2{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.drop-zone{
  border:2px dashed var(--accent);border-radius:18px;padding:28px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;transition:.3s;background:rgba(167,139,250,.04);
  margin:12px 0;
}
.drop-zone:hover{background:rgba(167,139,250,.1);border-color:var(--accent2);box-shadow:0 0 20px var(--accent-glow)}
.drop-zone-icon{font-size:40px}
.drop-zone p{color:var(--text-secondary);font-size:14px;font-weight:600;text-align:center}
.file-previews{display:flex;flex-direction:column;gap:8px;margin:8px 0;max-height:220px;overflow-y:auto}
.file-prev-item{
  display:flex;align-items:center;gap:12px;padding:10px;
  background:rgba(167,139,250,.06);border:1px solid var(--border-color);border-radius:14px;
}
.file-prev-item img,.file-prev-item video{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0}
.file-prev-item span{flex:1;font-size:13px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-prev-item button{background:var(--danger);color:#fff;border:none;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:14px;flex-shrink:0;transition:.3s}
.file-prev-item button:hover{transform:rotate(90deg) scale(1.1)}
.music-zone{
  border:1px solid var(--music-color);border-radius:16px;padding:14px;
  display:flex;align-items:center;gap:12px;cursor:pointer;transition:.3s;
  background:rgba(74,222,128,.05);
}
.music-zone:hover{background:rgba(74,222,128,.12);box-shadow:0 0 16px rgba(74,222,128,.2)}
.music-name{font-size:13px;color:var(--music-color);font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ═══════════════════════════════════════════════════════
   LEADERBOARD
═══════════════════════════════════════════════════════ */
.lb-wrap{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.lb-tabs{display:flex;gap:8px;background:var(--card-bg);border:1px solid var(--card-border);backdrop-filter:var(--glass-blur);border-radius:20px;padding:6px}
.lb-tab{flex:1;padding:10px;border:none;background:transparent;color:var(--text-tertiary);border-radius:14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.3s;letter-spacing:.3px}
.lb-tab.active{background:var(--btn-primary);color:#fff;box-shadow:0 4px 14px var(--accent-glow)}
.lb-rank-card{padding:24px;text-align:center}
.lb-rank-num{font-family:'Orbitron',monospace;font-size:52px;font-weight:900;background:linear-gradient(135deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
[data-theme="night"] .lb-rank-num{filter:drop-shadow(0 0 15px rgba(255,200,0,.5))}
.lb-rank-sub{font-size:14px;color:var(--text-secondary);font-weight:700}
.lb-list{overflow:hidden}
.lb-head{
  display:flex;align-items:center;padding:12px 18px;
  background:rgba(167,139,250,.06);border-bottom:1px solid var(--border-color);
  font-size:12px;font-weight:700;color:var(--text-tertiary);letter-spacing:.5px;
}
.lbh-rank{width:54px}.lbh-user{flex:1}.lbh-lv{width:72px;text-align:center}.lbh-xp{width:72px;text-align:center}.lbh-posts{width:60px;text-align:center}
.lb-item{
  display:flex;align-items:center;padding:12px 18px;
  border-bottom:1px solid var(--border-color);cursor:pointer;transition:.3s;
}
.lb-item:hover{background:rgba(167,139,250,.06);transform:translateX(4px)}
.lb-item.me{background:rgba(167,139,250,.12);border-left:3px solid var(--accent)}
.lb-rank{width:54px;font-family:'Orbitron',monospace;font-size:16px;font-weight:900}
.m1{color:#ffd700;text-shadow:0 0 10px rgba(255,200,0,.5)}
.m2{color:#c0c0c0;text-shadow:0 0 8px rgba(200,200,200,.4)}
.m3{color:#cd7f32;text-shadow:0 0 8px rgba(200,120,50,.4)}
.lb-user{flex:1;display:flex;align-items:center;gap:12px}
.lb-user img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);box-shadow:0 0 8px var(--accent-glow)}
.lb-uname{font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.lb-lv{width:72px;text-align:center;font-weight:700;color:var(--accent);font-family:'Orbitron',monospace;font-size:13px}
.lb-xp{width:72px;text-align:center;font-size:12px;color:var(--text-tertiary)}
.lb-posts{width:60px;text-align:center;font-size:12px;color:var(--text-tertiary)}

/* ═══════════════════════════════════════════════════════
   CHAT LIST
═══════════════════════════════════════════════════════ */
.chat-wrap{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.chat-top{display:flex;align-items:center;justify-content:space-between;padding:18px 20px}
.chat-top h2{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--text-primary)}
.conv-list{display:flex;flex-direction:column;gap:8px}
.conv-item{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;transition:.3s;}
.conv-item:hover{transform:translateX(5px);background:rgba(167,139,250,.06)}
.conv-item.unread{border-left:3px solid var(--accent);background:rgba(167,139,250,.08)}
.conv-ava{position:relative;flex-shrink:0}
.conv-ava img{width:54px;height:54px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);box-shadow:0 0 10px var(--accent-glow)}
.conv-info{flex:1;min-width:0}
.conv-top2{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.conv-name{font-weight:700;font-size:15px;color:var(--text-primary);display:flex;align-items:center;gap:4px}
.conv-time{font-size:11px;color:var(--text-tertiary);flex-shrink:0}
.conv-last{font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.conv-last.bold{font-weight:700;color:var(--text-primary)}
.unread-pill{
  background:var(--accent);color:#fff;font-size:11px;font-weight:800;
  padding:3px 8px;border-radius:10px;flex-shrink:0;
  box-shadow:0 0 8px var(--accent-glow);
}

/* ═══════════════════════════════════════════════════════
   CHAT ROOM
═══════════════════════════════════════════════════════ */
.chat-room{display:flex;flex-direction:column;height:100%;max-width:600px;margin:0 auto;border-radius:24px;overflow:hidden;}
.chat-room-head{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  border-bottom:1px solid var(--border-color);flex-shrink:0;
  background:var(--card-bg);backdrop-filter:var(--glass-blur);
}
.chat-back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--accent);padding:4px 8px;border-radius:50%;transition:.3s}
.chat-back:hover{background:rgba(167,139,250,.15);transform:translateX(-2px)}
.chat-room-ava{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);box-shadow:0 0 10px var(--accent-glow);cursor:pointer}
.chat-room-info{flex:1}
.chat-room-uname{font-weight:700;font-size:16px;color:var(--text-primary);cursor:pointer;display:flex;align-items:center;gap:5px}
.chat-room-status{font-size:12px;color:var(--success);font-weight:600}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px;opacity:.4}
.date-sep{text-align:center;margin:10px 0}
.date-sep span{background:rgba(167,139,250,.15);color:var(--text-tertiary);font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;border:1px solid var(--border-color)}
.msg-row{display:flex;gap:8px;animation:msgPop .25s cubic-bezier(.34,1.56,.64,1)}
.msg-row.mine{flex-direction:row-reverse}
@keyframes msgPop{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:none}}
.msg-ava{width:32px;height:32px;border-radius:50%;object-fit:cover;align-self:flex-end;cursor:pointer;flex-shrink:0;border:1px solid var(--accent)}
.msg-row.mine .msg-ava{display:none}
.msg-bwrap{display:flex;flex-direction:column;max-width:72%}
.msg-row.mine .msg-bwrap{align-items:flex-end}
.msg-row.theirs .msg-bwrap{align-items:flex-start}
.msg-bubble{padding:10px 15px;border-radius:20px;word-break:break-word}
.msg-row.mine .msg-bubble{background:var(--chat-me);color:var(--chat-me-text);border-radius:20px 20px 5px 20px}
.msg-row.theirs .msg-bubble{background:var(--chat-them);color:var(--chat-them-text);border-radius:20px 20px 20px 5px;border:1px solid var(--border-color)}
.msg-text{font-size:14px;line-height:1.5}
.msg-media{max-width:220px;border-radius:14px;overflow:hidden;margin-top:6px;cursor:pointer}
.msg-media img,.msg-media video{width:100%;display:block;border-radius:14px}
.msg-meta{display:flex;align-items:center;gap:5px;margin-top:4px}
.msg-time{font-size:10px;color:var(--text-tertiary)}
.msg-row.mine .msg-time{color:rgba(255,255,255,.5)}
.msg-tick{font-size:12px}
.msg-tick.read{color:#38bdf8}
.msg-del{background:none;border:none;font-size:12px;cursor:pointer;opacity:0;color:var(--text-tertiary);padding:2px 5px;border-radius:6px;transition:.2s;align-self:center}
.msg-row:hover .msg-del{opacity:1}
.msg-del:hover{background:rgba(239,68,68,.15);color:var(--danger)}
.msg-deleted{opacity:.5;font-style:italic;font-size:13px}
.chat-input-area{
  padding:12px 16px;border-top:1px solid var(--border-color);
  background:var(--card-bg);backdrop-filter:var(--glass-blur);flex-shrink:0;
}
.chat-media-prev{position:relative;display:inline-block;margin-bottom:8px}
.chat-media-prev img,.chat-media-prev video{width:80px;height:80px;object-fit:cover;border-radius:14px;border:2px solid var(--accent)}
.chat-del-media{
  position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;
  border:none;width:22px;height:22px;border-radius:50%;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.chat-row{display:flex;gap:10px;align-items:flex-end}
.chat-attach{
  background:rgba(167,139,250,.1);border:1px solid var(--border-color);
  width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.3s;flex-shrink:0;color:var(--text-primary);
}
.chat-attach:hover{background:rgba(167,139,250,.25);transform:scale(1.05)}
.chat-inp{
  flex:1;padding:11px 18px;background:var(--input-bg);color:var(--text-primary);
  border:1px solid var(--input-border);border-radius:24px;
  font-family:'Nunito',sans-serif;font-size:14px;resize:none;max-height:100px;
  outline:none;transition:.3s;
}
.chat-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.chat-send{
  background:var(--btn-primary);border:none;width:44px;height:44px;border-radius:50%;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.3s;color:#fff;
}
.chat-send:hover{transform:scale(1.1);box-shadow:0 4px 16px var(--accent-glow)}
.chat-send:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ═══════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════ */
.modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);justify-content:center;align-items:center;padding:20px;}
.modal.open{display:flex}
.modal-box{
  background:var(--card-bg);backdrop-filter:var(--glass-blur);
  border:1px solid var(--card-border);border-radius:28px;
  width:100%;max-width:560px;max-height:88vh;overflow-y:auto;
  animation:modalIn .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:none}}
.modal-head{padding:20px 22px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-family:'Orbitron',monospace;font-size:17px;font-weight:700;color:var(--text-primary)}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-tertiary);padding:2px 6px;border-radius:8px;transition:.2s}
.modal-close:hover{background:rgba(239,68,68,.15);color:var(--danger)}
.modal-body{padding:22px}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border-color);display:flex;gap:12px}

/* Comments Modal */
.comments-modal .modal-box{display:flex;flex-direction:column;height:82vh;max-height:82vh}
.comments-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.comment-item{display:flex;gap:12px}
.comment-item img{width:38px;height:38px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0;border:2px solid var(--border-color)}
.comment-bub{flex:1;background:rgba(167,139,250,.07);border:1px solid var(--border-color);border-radius:18px;padding:10px 14px;max-width:85%}
.comment-uname{font-weight:700;font-size:13px;color:var(--accent);margin-bottom:4px;cursor:pointer;display:flex;align-items:center;gap:4px}
.comment-text{font-size:13px;color:var(--text-primary);line-height:1.45;word-break:break-word}
.comment-media-wrap{margin-top:8px;border-radius:14px;overflow:hidden;width:160px;height:160px;background:#000;display:flex;align-items:center;justify-content:center}
.comment-media-wrap img,.comment-media-wrap video{width:100%;height:100%;object-fit:cover;cursor:pointer}
.comment-time{font-size:10px;color:var(--text-tertiary);margin-top:4px}
.comment-foot{padding:14px 16px;border-top:1px solid var(--border-color);flex-shrink:0}
.comment-inp-row{display:flex;gap:10px;margin-bottom:10px}
.comment-inp-row input{flex:1;padding:11px 16px;border:1px solid var(--input-border);border-radius:24px;background:var(--input-bg);color:var(--text-primary);font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:.3s}
.comment-inp-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.comment-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sticker-btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:30px;border:none;
  background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.3s;
}
.sticker-btn:hover{transform:scale(1.05);box-shadow:0 4px 14px rgba(240,147,251,.4)}
.sticker-prev-wrap{position:relative;display:inline-block}
.sticker-prev{width:75px;height:75px;object-fit:cover;border-radius:14px;border:2px solid var(--accent)}
.sticker-rm{position:absolute;top:-8px;right:-8px;background:var(--danger);color:#fff;border:none;width:24px;height:24px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Post Detail Modal */
.pd-head{padding:16px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border-color)}
.pd-head img{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);cursor:pointer;box-shadow:0 0 10px var(--accent-glow)}
.pd-uname{font-weight:700;font-size:15px;color:var(--text-primary);cursor:pointer;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.pd-time{font-size:12px;color:var(--text-tertiary)}
.pd-media-wrap{width:100%;background:#000;display:flex;overflow-x:auto;scroll-snap-type:x mandatory}
.pd-media-item{flex:0 0 100%;scroll-snap-align:start}
.pd-media{width:100%;max-height:400px;object-fit:contain;background:#000;display:block}
.pd-caption{padding:14px 18px;font-size:14px;color:var(--text-primary);border-bottom:1px solid var(--border-color);line-height:1.55}
.pd-actions{padding:14px 18px;display:flex;gap:8px;border-bottom:1px solid var(--border-color)}
.pd-stats{padding:8px 18px 14px;font-size:14px;color:var(--text-primary)}
.pd-stats span{font-weight:800}
.pd-comments{max-height:200px;overflow-y:auto;padding:14px 18px;border-top:1px solid var(--border-color);display:flex;flex-direction:column;gap:10px}
.pd-comment{display:flex;gap:10px}
.pd-comment img{width:32px;height:32px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0}
.pd-comment-bub{flex:1;background:rgba(167,139,250,.07);border:1px solid var(--border-color);border-radius:16px;padding:8px 12px}
.pd-comment-uname{font-weight:700;font-size:12px;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:3px}
.pd-comment-text{font-size:12px;color:var(--text-primary);margin-top:2px}
.pd-add-comment{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--border-color)}
.pd-add-comment input{flex:1;padding:10px 16px;border:1px solid var(--input-border);border-radius:24px;background:var(--input-bg);color:var(--text-primary);font-family:'Nunito',sans-serif;outline:none;transition:.3s}
.pd-add-comment input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.pd-close{
  position:absolute;top:10px;right:10px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.6);color:#fff;border:none;
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);z-index:10;transition:.3s;
}
.pd-close:hover{background:rgba(239,68,68,.7);transform:rotate(90deg)}

/* Edit Profile Modal */
.ep-ava-wrap{display:flex;justify-content:center;margin-bottom:20px;position:relative}
.ep-ava{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);cursor:pointer;box-shadow:0 0 20px var(--accent-glow)}
.ep-ava-btn{
  position:absolute;bottom:0;right:calc(50% - 62px);
  background:var(--accent);border:none;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;
  box-shadow:0 0 10px var(--accent-glow);
}
.ep-field{margin-bottom:18px}
.ep-field label{display:block;font-weight:700;font-size:13px;color:var(--text-secondary);margin-bottom:8px;letter-spacing:.4px}
.bio-count{font-size:11px;color:var(--text-tertiary);text-align:right;margin-top:4px}

/* Wallpaper settings */
.wall-box{border:1px solid var(--border-color);border-radius:20px;overflow:hidden;margin-top:16px}
.wall-head{padding:14px 16px;background:rgba(167,139,250,.06);border-bottom:1px solid var(--border-color)}
.wall-head label{font-weight:700;font-size:14px;color:var(--text-primary)}
.wall-prev{height:160px;position:relative;background-size:cover;background-position:center;overflow:hidden;transition:.3s}
.wall-prev-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;pointer-events:none}
.wall-prev-overlay span{color:#fff;font-size:13px;font-weight:700;background:rgba(0,0,0,.5);padding:5px 14px;border-radius:20px}
.wall-tabs{display:flex;gap:6px;padding:10px;background:rgba(167,139,250,.04);border-bottom:1px solid var(--border-color)}
.wall-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--text-tertiary);border-radius:14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.3s}
.wall-tab.active{background:var(--btn-primary);color:#fff}
.wall-opts{padding:14px}
.wall-upload-btn{
  width:100%;padding:13px;border:2px dashed var(--accent);border-radius:16px;
  background:rgba(167,139,250,.05);color:var(--accent);
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.3s;
  display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;
}
.wall-upload-btn:hover{background:rgba(167,139,250,.15)}
.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.color-opt{aspect-ratio:1;border-radius:14px;cursor:pointer;transition:.3s;border:2px solid transparent}
.color-opt.sel{border-color:var(--accent);transform:scale(1.06);box-shadow:0 0 12px var(--accent-glow)}
.grad-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.grad-opt{height:60px;border-radius:14px;cursor:pointer;transition:.3s;border:2px solid transparent}
.grad-opt.sel{border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
.blur-row{display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(167,139,250,.06);border-radius:14px;cursor:pointer}
.blur-row-lbl{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--text-primary);font-size:14px}
.blur-sw{width:50px;height:26px;background:var(--border-color);border-radius:30px;position:relative;transition:.3s}
.blur-sw.on{background:var(--accent);box-shadow:0 0 10px var(--accent-glow)}
.blur-sw::after{content:'';width:22px;height:22px;background:#fff;border-radius:50%;position:absolute;top:2px;left:3px;transition:.35s}
.blur-sw.on::after{left:25px}

/* Admin Panel */
.admin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px;padding:0 20px}
.admin-card{padding:18px;border-radius:20px;position:relative;overflow:hidden;border:1px solid var(--border-color);transition:.3s;cursor:default;}
.admin-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--btn-primary)}
.admin-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px var(--accent-glow)}
.admin-card-icon{font-size:28px;margin-bottom:10px}
.admin-card-num{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--text-primary)}
.admin-card-lbl{font-size:13px;color:var(--text-secondary);margin-top:4px}
.admin-tabs{display:flex;gap:8px;margin:0 20px 18px;background:rgba(167,139,250,.06);border:1px solid var(--border-color);padding:6px;border-radius:18px;flex-wrap:wrap}
.admin-tab{flex:1;padding:10px;border:none;background:transparent;color:var(--text-tertiary);border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:5px}
.admin-tab.active{background:var(--btn-primary);color:#fff;box-shadow:0 4px 12px var(--accent-glow)}
.admin-section{display:none;padding:0 20px 20px}
.admin-section.active{display:block}
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{text-align:left;padding:10px 8px;color:var(--text-tertiary);font-size:12px;font-weight:700;border-bottom:2px solid var(--border-color);letter-spacing:.4px}
.admin-table td{padding:10px 8px;border-bottom:1px solid var(--border-color);color:var(--text-primary);font-size:13px;vertical-align:middle}
.admin-table tr:hover td{background:rgba(167,139,250,.05)}
.admin-ucell{display:flex;align-items:center;gap:10px}
.admin-ucell img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--accent)}
.admin-act{padding:5px 11px;border:none;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:.3s;margin:2px;font-family:'Nunito',sans-serif}
.admin-act.av{background:rgba(56,189,248,.12);color:var(--accent2);border:1px solid var(--accent2)}
.admin-act.av:hover{background:var(--accent2);color:#fff}
.admin-act.ad{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid var(--danger)}
.admin-act.ad:hover{background:var(--danger);color:#fff}
.admin-act.bg{background:linear-gradient(135deg,#a855f7,#d946ef);color:#fff}
.admin-act.dl{background:rgba(220,38,38,.08);color:#dc2626;border:1px solid #dc2626}
.admin-act.dl:hover{background:#dc2626;color:#fff}
.admin-post-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:16px;margin-bottom:8px;transition:.3s}
.admin-post-item:hover{background:rgba(167,139,250,.06)}
.admin-thumb{width:52px;height:52px;border-radius:14px;overflow:hidden;background:#000;flex-shrink:0}
.admin-thumb img,.admin-thumb video{width:100%;height:100%;object-fit:cover}
.admin-post-info{flex:1}
.admin-post-info strong{font-size:14px;color:var(--text-primary)}
.admin-post-info div{font-size:12px;color:var(--text-tertiary);margin-top:2px}
.admin-del-btn{background:var(--danger);color:#fff;border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;transition:.3s;display:flex;align-items:center;justify-content:center;}
.admin-del-btn:hover{background:#b91c1c;transform:rotate(90deg) scale(1.1)}
.badge-list{display:flex;flex-direction:column;gap:10px}
.badge-card-item{display:flex;align-items:center;justify-content:space-between;padding:14px;border:1px solid var(--border-color);border-radius:18px;transition:.3s}
.badge-card-item:hover{background:rgba(167,139,250,.06)}
.badge-icon-big{width:48px;height:48px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(167,139,250,.1)}

/* New Chat Search */
.new-chat-res{padding:12px;max-height:320px;overflow-y:auto}

/* Delete confirm modal */
.del-confirm{text-align:center;padding:10px 0}
.del-confirm .big-icon{font-size:56px;margin-bottom:14px}
.del-confirm h3{font-family:'Orbitron',monospace;font-size:18px;color:var(--danger);margin-bottom:10px}
.del-confirm p{color:var(--text-secondary);font-size:14px;line-height:1.6}
.del-warn{margin-top:14px;padding:10px 16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:14px;font-size:13px;font-weight:700;color:var(--danger)}

/* Form group for assign badge */
.form-grp{margin-bottom:18px}
.form-grp label{display:block;font-weight:700;font-size:13px;color:var(--text-secondary);margin-bottom:8px;letter-spacing:.4px}
select.inp{appearance:none;cursor:pointer}
.badge-prev-area{background:rgba(167,139,250,.06);border:1px solid var(--border-color);border-radius:16px;padding:14px;text-align:center;margin-top:14px}
.badge-prev-lbl{font-size:12px;color:var(--text-tertiary);margin-bottom:10px}
.badge-prev-chip{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:40px;font-size:14px;font-weight:700}

/* Empty / Loading states */
.empty{text-align:center;padding:50px 20px;color:var(--text-secondary)}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.5}
.empty h3{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text-primary)}
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--text-secondary);font-size:14px}
.spin-sm{width:20px;height:20px;border:2px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0}

/* Level-up notification */
.level-up-notif{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0a00;
  padding:14px 28px;border-radius:50px;font-weight:900;font-family:'Orbitron',monospace;
  z-index:2000;font-size:14px;letter-spacing:1px;
  animation:levelUp .4s cubic-bezier(.34,1.56,.64,1),pulse3 .6s ease .4s;
  box-shadow:0 6px 30px rgba(255,150,0,.6);
}
@keyframes levelUp{from{opacity:0;transform:translateX(-50%) scale(.7)}to{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes pulse3{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.06)}}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px;opacity:.4}

/* Responsive */
@media(min-width:769px){
  #app{max-width:480px;margin:0 auto;height:96vh;border-radius:32px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.7)}
  .moon,.sun{right:calc(50% - 290px)}
}
@media(max-width:480px){
  .lbh-xp,.lbh-posts,.lb-xp,.lb-posts{display:none}
  .sun,.moon{right:20px;top:50px;width:55px;height:55px}
}
</style>
</head>
<body>

<!-- ═══ SKY CANVAS (DIV — BUKAN CANVAS) ═══ -->
<!-- INI FIX UTAMA: Dulu elemen ini tidak ada di HTML,
     hanya ada di CSS. Sekarang ditambahkan sebagai div
     agar background gradient bisa tampil -->
<div id="skyCanvas"></div>

<!-- ═══ STAR & METEOR CANVAS ═══ -->
<canvas id="meteorCanvas"></canvas>
<canvas id="starsLayer"></canvas>

<div class="moon" id="moonEl"></div>
<div class="sun" id="sunEl"></div>
<div class="aurora" id="auroraEl"></div>

<div class="clouds-layer">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
</div>

<!-- RAIN LAYER -->
<div class="rain-layer" id="rainLayer">
  <canvas id="rainCanvas"></canvas>
  <div class="ripple-pool" id="ripplePool"></div>
</div>

<!-- ═══ TOAST CONTAINER ═══ -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- ═══ LOADING OVERLAY ═══ -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-ring"></div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app">
  <header>
    <div class="logo" onclick="navigate(currentView||'feed')">✦ MIO</div>
    <div class="header-right">
      <div class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Ganti tema Siang/Malam">
        <span class="theme-btn-day">☀️</span>
        <span class="theme-btn-night">🌙</span>
        <div class="theme-btn-knob" id="themeKnob"></div>
      </div>
      <div id="userHeaderArea" style="display:none;display:flex;align-items:center;gap:10px">
        <img id="headerAvatar" class="avatar-sm" src="" alt="me" onclick="navigate('profile')">
        <button class="logout-btn" id="logoutBtn">Keluar</button>
      </div>
    </div>
  </header>

  <main id="main"></main>

  <nav class="bottom-nav" id="bottomNav" style="display:none">

<script>
// ═══════════════════════════════════════════════════════
// THEME TOGGLE — apply SEBELUM apapun untuk cegah flicker
// ═══════════════════════════════════════════════════════
(function(){
  const saved = localStorage.getItem('mioTheme') || 'night';
  document.documentElement.setAttribute('data-theme', saved);
})();

// ═══════════════════════════════════════════════════════
// STAR + METEOR CANVAS SYSTEM (NIGHT)
// ═══════════════════════════════════════════════════════
(function(){
  const mc   = document.getElementById('meteorCanvas');
  const sc   = document.getElementById('starsLayer');
  const mctx = mc.getContext('2d');
  const sctx = sc.getContext('2d');

  function resize(){
    mc.width = sc.width = window.innerWidth;
    mc.height = sc.height = window.innerHeight;
    generateStars();
  }

  const stars = [];
  function generateStars(){
    stars.length = 0;
    const count = Math.floor((window.innerWidth * window.innerHeight) / 2200);
    for(let i = 0; i < count; i++){
      const tier = Math.random();
      stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight * 0.88,
        r: tier < 0.68  ? Math.random() * 0.85 + 0.15
           : tier < 0.92 ? Math.random() * 1.3 + 0.8
           : Math.random() * 1.9 + 1.3,
        a:  Math.random() * 0.5 + 0.25,
        da: (Math.random() * 0.007 + 0.002) * (Math.random() < .5 ? 1 : -1),
        color: Math.random() < .07 ? '#fde68a'
             : Math.random() < .07 ? '#bfdbfe'
             : Math.random() < .04 ? '#fca5a5'
             : '#ffffff'
      });
    }
  }

  function drawMilkyWay(){
    const w = sc.width, h = sc.height;
    const grad = sctx.createLinearGradient(w * 0.08, h * 0.04, w * 0.92, h * 0.7);
    grad.addColorStop(0,   'rgba(180,160,255,0)');
    grad.addColorStop(0.25,'rgba(180,160,255,0.022)');
    grad.addColorStop(0.5, 'rgba(210,190,255,0.038)');
    grad.addColorStop(0.75,'rgba(180,160,255,0.022)');
    grad.addColorStop(1,   'rgba(180,160,255,0)');
    sctx.save();
    sctx.fillStyle = grad;
    sctx.beginPath();
    sctx.moveTo(0, h * 0.12);
    sctx.bezierCurveTo(w * 0.28, h * 0.04, w * 0.62, h * 0.52, w, h * 0.62);
    sctx.lineTo(w, h * 0.78);
    sctx.bezierCurveTo(w * 0.62, h * 0.66, w * 0.28, h * 0.18, 0, h * 0.28);
    sctx.closePath();
    sctx.fill();
    sctx.restore();
  }

  function animateStars(){
    sctx.clearRect(0, 0, sc.width, sc.height);
    const isNight = document.documentElement.getAttribute('data-theme') !== 'day';
    if(isNight) drawMilkyWay();
    stars.forEach(s => {
      s.a += s.da;
      if(s.a > 0.92 || s.a < 0.06) s.da *= -1;
      sctx.save();
      sctx.globalAlpha = Math.max(0.06, Math.min(0.92, s.a));
      sctx.fillStyle   = s.color;
      if(s.r > 1.3){
        sctx.shadowBlur  = s.r * 5;
        sctx.shadowColor = s.color;
      }
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      sctx.fill();
      sctx.restore();
    });
  }

  const meteors = [];
  function spawnMeteor(){
    const angle  = Math.PI / 5 + (Math.random() - 0.5) * (Math.PI / 8);
    const startX = Math.random() * window.innerWidth * 1.5 - window.innerWidth * 0.25;
    const speed  = 7 + Math.random() * 12;
    const len    = 80 + Math.random() * 220;
    const cols   = ['rgba(255,255,255','rgba(200,180,255','rgba(150,220,255','rgba(255,230,150'];
    meteors.push({
      x: startX, y: -60,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      len, col: cols[Math.floor(Math.random() * cols.length)],
      alpha: 1, width: 1.2 + Math.random() * 1.8, tail: []
    });
  }

  function animateMeteors(){
    mctx.clearRect(0, 0, mc.width, mc.height);
    if(document.documentElement.getAttribute('data-theme') === 'day') return;
    if(Math.random() < 0.025) spawnMeteor();
    meteors.forEach((m, i) => {
      m.tail.unshift({x: m.x, y: m.y});
      if(m.tail.length > Math.floor(m.len / 5)) m.tail.pop();
      m.x += m.vx; m.y += m.vy; m.alpha -= 0.013;
      if(m.alpha <= 0 || m.y > mc.height + 80){ meteors.splice(i, 1); return; }
      if(m.tail.length > 1){
        const last = m.tail[m.tail.length - 1];
        const grad = mctx.createLinearGradient(last.x, last.y, m.x, m.y);
        grad.addColorStop(0, `${m.col},0)`);
        grad.addColorStop(1, `${m.col},${m.alpha})`);
        mctx.save();
        mctx.strokeStyle = grad;
        mctx.lineWidth   = m.width;
        mctx.shadowBlur  = 14;
        mctx.shadowColor = `${m.col},${m.alpha * 0.8})`;
        mctx.beginPath();
        mctx.moveTo(last.x, last.y);
        m.tail.forEach(pt => mctx.lineTo(pt.x, pt.y));
        mctx.lineTo(m.x, m.y);
        mctx.stroke();
        mctx.restore();
      }
      mctx.save();
      mctx.globalAlpha = m.alpha;
      const hg = mctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.width * 5);
      hg.addColorStop(0, 'rgba(255,255,255,1)');
      hg.addColorStop(1, 'rgba(255,255,255,0)');
      mctx.fillStyle = hg;
      mctx.beginPath();
      mctx.arc(m.x, m.y, m.width * 5, 0, Math.PI * 2);
      mctx.fill();
      mctx.restore();
    });
  }

  function loop(){ animateStars(); animateMeteors(); requestAnimationFrame(loop); }
  window.addEventListener('resize', resize);
  resize();
  loop();
})();

// ═══════════════════════════════════════════════════════
// RAIN SYSTEM (DAY)
// ═══════════════════════════════════════════════════════
(function(){
  const canvas = document.getElementById('rainCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');

  const CFG = {
    dropCount:  185,
    minSpeed:   11,
    maxSpeed:   23,
    minLength:  16,
    maxLength:  44,
    windAngle:  0.22,
    minOpacity: 0.10,
    maxOpacity: 0.52,
    color:      '120,185,255',
  };

  let drops = [], w = 0, h = 0;

  function resize(){
    w = canvas.width  = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function mkDrop(randomY){
    const speed   = CFG.minSpeed + Math.random() * (CFG.maxSpeed - CFG.minSpeed);
    const length  = CFG.minLength + Math.random() * (CFG.maxLength - CFG.minLength);
    const opacity = CFG.minOpacity + Math.random() * (CFG.maxOpacity - CFG.minOpacity);
    return {
      x: Math.random() * (w + 200) - 100,
      y: randomY ? Math.random() * h : -length - Math.random() * h * 0.3,
      speed, length, opacity,
      width: 0.45 + Math.random() * 0.9,
    };
  }

  function initDrops(){
    drops = [];
    for(let i = 0; i < CFG.dropCount; i++) drops.push(mkDrop(true));
  }

  function drawDrop(d){
    const vx = Math.sin(CFG.windAngle) * d.speed;
    const vy = Math.cos(CFG.windAngle) * d.speed;
    const x2 = d.x - vx * (d.length / d.speed);
    const y2 = d.y - vy * (d.length / d.speed);
    const grad = ctx.createLinearGradient(x2, y2, d.x, d.y);
    grad.addColorStop(0,   `rgba(${CFG.color},0)`);
    grad.addColorStop(0.35,`rgba(${CFG.color},${d.opacity * 0.45})`);
    grad.addColorStop(1,   `rgba(${CFG.color},${d.opacity})`);
    ctx.save();
    ctx.strokeStyle = grad;
    ctx.lineWidth   = d.width;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(d.x, d.y);
    ctx.stroke();
    ctx.restore();
  }

  function updateDrop(d){
    d.x += Math.sin(CFG.windAngle) * d.speed;
    d.y += Math.cos(CFG.windAngle) * d.speed;
    if(d.y > h + d.length || d.x > w + 120){
      const nd = mkDrop(false);
      Object.assign(d, nd);
    }
  }

  const pool = document.getElementById('ripplePool');
  function spawnRipple(){
    if(!pool) return;
    const el  = document.createElement('div');
    el.className = 'ripple';
    const sz = 8 + Math.random() * 22;
    el.style.cssText = `left:${Math.random()*100}%;width:${sz}px;height:${sz*0.38}px;animation-duration:${0.55+Math.random()*0.9}s;animation-delay:${Math.random()*0.25}s;`;
    pool.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }

  let lastRipple = 0;
  function loop(ts){
    const isDay = document.documentElement.getAttribute('data-theme') === 'day';
    ctx.clearRect(0, 0, w, h);
    if(isDay){
      drops.forEach(d => { drawDrop(d); updateDrop(d); });
      if(ts - lastRipple > 175){ spawnRipple(); lastRipple = ts; }
    }
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => { resize(); initDrops(); });
  resize();
  initDrops();
  requestAnimationFrame(loop);
})();

// ═══════════════════════════════════════════════════════
// THEME TOGGLE
// ═══════════════════════════════════════════════════════
function toggleTheme(){
  const cur  = document.documentElement.getAttribute('data-theme');
  const next = cur === 'night' ? 'day' : 'night';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mioTheme', next);
}
function initTheme(){
  const saved = localStorage.getItem('mioTheme') || 'night';
  document.documentElement.setAttribute('data-theme', saved);
}
initTheme();

// ═══════════════════════════════════════════════════════
// SECURITY HELPERS
// ═══════════════════════════════════════════════════════
function escHtml(s){
  if(s===null||s===undefined) return '';
  const d=document.createElement('div');
  d.textContent=String(s);
  return d.innerHTML;
}
function safeUrl(url){
  if(!url||typeof url!=='string') return null;
  if(url.startsWith('/uploads/')&&!url.includes('..')&&!url.includes('\0')) return url;
  if(url.startsWith('blob:')) return url;
  return null;
}
function safeImg(url){ return safeUrl(url)||'https://via.placeholder.com/40'; }
function safeOpen(url){ const s=safeUrl(url); if(s) window.open(s,'_blank','noopener,noreferrer'); }

const MIME_IMG=['image/jpeg','image/jpg','image/png','image/gif','image/webp'];
const MIME_VID=['video/mp4','video/webm','video/quicktime','video/avi'];
const MIME_AUD=['audio/mpeg','audio/mp3','audio/wav','audio/ogg','audio/mp4','audio/aac'];

function validateFile(file,allowed,maxMB){
  if(!allowed.includes(file.type)) return `Format "${file.name}" tidak didukung`;
  if(file.size>maxMB*1024*1024) return `File "${file.name}" terlalu besar (max ${maxMB}MB)`;
  return null;
}

// ═══════════════════════════════════════════════════════
// TOAST SYSTEM
// ═══════════════════════════════════════════════════════
function toast(msg,type='info',ms=4000){
  const icons={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${icons[type]}</span><span style="flex:1">${escHtml(msg)}</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('toastWrap').appendChild(el);

// ═══════════════════════════════════════════════════════
// TIME HELPERS
// ═══════════════════════════════════════════════════════
function timeAgo(d){
  const m=Math.floor((Date.now()-new Date(d).getTime())/60000);
  if(m<1) return 'Baru saja';if(m<60) return `${m}m`;
  const h=Math.floor(m/60);if(h<24) return `${h}j`;
  const dd=Math.floor(h/24);if(dd<7) return `${dd}h`;
  return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short'});
}
function fmtTime(d){return new Date(d).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
function fmtDate(d){
  const dt=new Date(d),t=new Date(),y=new Date(t);y.setDate(y.getDate()-1);
  if(dt.toDateString()===t.toDateString()) return 'Hari ini';
  if(dt.toDateString()===y.toDateString()) return 'Kemarin';
  return dt.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long'});
}

function initAudio(pid,url){
  const s=safeUrl(url);if(!s)return;
  const a=new Audio(s);a.loop=true;a.volume=0.5;a.preload='none';
  window[`pa_${pid}`]=a;window[`pp_${pid}`]=false;
}
window.toggleMusic=function(pid){
  const a=window[`pa_${pid}`];const s=document.getElementById(`ms_${pid}`);if(!a)return;
  if(window[`pp_${pid}`]){a.pause();window[`pp_${pid}`]=false;if(s)s.textContent='♪ Play';}
  else{stopAllAudio(pid);a.currentTime=0;a.play().catch(()=>{});window[`pp_${pid}`]=true;if(s)s.textContent='♪ Stop';}
};
function stopAllAudio(keep){
  for(const k in window){
    if(k.startsWith('pa_')&&k!==`pa_${keep}`&&window[k] instanceof Audio){
      window[k].pause();window[k].currentTime=0;
      window[k.replace('pa_','pp_')]=false;
      const s=document.getElementById(`ms_${k.replace('pa_','')}`);if(s)s.textContent='♪ Play';
    }
  }
}

function renderAuth(){
  currentUser=null;
  document.getElementById('userHeaderArea').style.display='none';
  document.getElementById('bottomNav').style.display='none';
  document.getElementById('main').innerHTML=`
  <div class="auth-wrap">
    <div class="auth-logo-big">
      <h1>✦ MIO MEDIA</h1>
      <p>Bagikan universemu kepada dunia ✨</p>
    </div>
    <div class="glass auth-box">
      <h2 id="authTitle">LOGIN</h2>
      <div class="auth-field">
        <label>Username</label>
        <input type="text" class="inp" id="authUser" placeholder="Masukkan username" maxlength="30" autocomplete="username">
        <div class="field-err" id="errUser"></div>
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" class="inp" id="authPass" placeholder="Masukkan password" maxlength="128" autocomplete="current-password">
        <div class="field-err" id="errPass"></div>
      </div>
      <label class="auth-remember"><input type="checkbox" id="authRemember"> Ingat saya 30 hari</label>
      <button class="btn btn-primary" id="authBtn" style="width:100%;margin-top:10px">🚀 Login</button>
      <div class="auth-toggle" id="authToggle">Belum punya akun? <strong>Daftar sekarang</strong></div>
    </div>
  </div>`;
  let isLogin=true;
  const btn=document.getElementById('authBtn'),toggle=document.getElementById('authToggle'),title=document.getElementById('authTitle');
  toggle.onclick=()=>{
    isLogin=!isLogin;
    title.textContent=isLogin?'LOGIN':'DAFTAR';
    btn.innerHTML=isLogin?'🚀 Login':'✨ Daftar';
    toggle.innerHTML=isLogin?'Belum punya akun? <strong>Daftar sekarang</strong>':'Sudah punya akun? <strong>Login</strong>';
    document.getElementById('errUser').classList.remove('show');
    document.getElementById('errPass').classList.remove('show');
  };
  const doAuth=async()=>{
    if(isSubmitting) return;
    const u=document.getElementById('authUser').value.trim();
    const p=document.getElementById('authPass').value;
    const r=document.getElementById('authRemember').checked;
    const eu=document.getElementById('errUser'),ep=document.getElementById('errPass');
    eu.classList.remove('show');ep.classList.remove('show');
    let ok=true;
    if(!u){eu.textContent='Username wajib diisi';eu.classList.add('show');ok=false;}
    else if(!isLogin&&!/^[a-zA-Z0-9_]{3,30}$/.test(u)){eu.textContent='3-30 karakter, huruf/angka/underscore';eu.classList.add('show');ok=false;}
    if(!p){ep.textContent='Password wajib diisi';ep.classList.add('show');ok=false;}
    else if(!isLogin&&p.length<8){ep.textContent='Minimal 8 karakter';ep.classList.add('show');ok=false;}
    if(!ok) return;
    isSubmitting=true;btn.disabled=true;btn.textContent=isLogin?'Memproses...':'Mendaftar...';
    showLoad();
    const d=await api(isLogin?'/api/login':'/api/register',{method:'POST',body:JSON.stringify({username:u,password:p,rememberMe:r})});
    hideLoad();btn.disabled=false;btn.innerHTML=isLogin?'🚀 Login':'✨ Daftar';isSubmitting=false;
    if(d?.success) await loadUser();
    else toast(d?.error||(isLogin?'Login gagal':'Registrasi gagal'),'error');
  };
  btn.onclick=doAuth;
  document.getElementById('authPass').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
}

async function handleCommentMedia(e){
  const f=e.target.files[0];if(!f)return;

  const r=new FileReader();
  r.onload=ev=>{

window.handleMedia=function(e){
  const files=Array.from(e.target.files);
  if(files.length+selectedFiles.length>5){toast('Maksimal 5 file!','warning');e.target.value='';return;}
  for(const f of files){const err=validateFile(f,[...MIME_IMG,...MIME_VID],100);if(err){toast(err,'error');e.target.value='';return;}selectedFiles.push(f);}
  renderFilePrevs();
};
function renderFilePrevs(){
  const c=document.getElementById('filePrevs');
  if(!selectedFiles.length){c.innerHTML='';return;}
  c.innerHTML=selectedFiles.map((f,i)=>{
    const url=URL.createObjectURL(f),ft=f.type.startsWith('image/')?'image':'video';
    return `<div class="file-prev-item">${ft==='image'?`<img src="${url}" alt="">`:`<video src="${url}" muted></video>`}<span>${escHtml(f.name.substring(0,25))}</span><button onclick="removeFile(${i})">×</button></div>`;
  }).join('');
}
window.removeFile=function(i){selectedFiles.splice(i,1);renderFilePrevs();};
window.handleMusic=function(e){
  const f=e.target.files[0];if(!f)return;
  const err=validateFile(f,MIME_AUD,10);if(err){toast(err,'error');e.target.value='';return;}
  selectedMusic=f;
  document.getElementById('musicName').textContent=f.name;
  document.getElementById('rmMusicBtn').style.display='inline-flex';
};
window.removeMusic=function(){selectedMusic=null;document.getElementById('musicName').textContent='Tambah musik latar (opsional)';document.getElementById('rmMusicBtn').style.display='none';document.getElementById('musicInp').value='';};
window.doUpload=async function(){
  if(isSubmitting||!selectedFiles.length){if(!selectedFiles.length)toast('Pilih minimal 1 file!','warning');return;}
  const caption=document.getElementById('captionInp').value;
  const fd=new FormData();
  selectedFiles.forEach((f,i)=>fd.append(`media${i}`,f));
  fd.append('fileCount',selectedFiles.length);
  fd.append('caption',caption);
  if(selectedMusic)fd.append('music',selectedMusic);
  const btn=document.getElementById('uploadBtn');
  isSubmitting=true;btn.disabled=true;btn.textContent='⏳ Mengupload...';
  showLoad();
  const r=await apiForm('/api/upload',fd);
  hideLoad();isSubmitting=false;btn.disabled=false;btn.innerHTML='🚀 Upload Sekarang';
  if(r?.success){if(r.leveledUp)showLevelUp(r.newLevel,'🎉');toast('Upload berhasil! +50 XP 🎉','success');navigate('feed');}
  else toast(r?.error||'Upload gagal','error');
};
