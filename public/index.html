async function loadChatMsgs(scroll=true){
  if(!convId)return;
  const d=await api(`/api/chat/${convId}/messages`);
  if(!d?.messages)return;
  if(d.messages.length===lastMsgCount&&!scroll)return;
  lastMsgCount=d.messages.length;
  const c=document.getElementById('chatMsgs');if(!c){stopChatPoll();return;}
  let html='',ld=null;
  d.messages.forEach(m=>{
    const md=new Date(m.createdAt).toDateString();
    if(md!==ld){html+=`<div class="date-sep"><span>${escHtml(fmtDate(m.createdAt))}</span></div>`;ld=md;}
    const mine=m.senderId===currentUser.id,del=m.deleted;
    const sm=escHtml(m.id),ss=escHtml(m.senderId);
    const su=safeUrl(m.mediaUrl);
    html+=`<div class="msg-row ${mine?'mine':'theirs'}" data-mid="${sm}">
      ${!mine?`<img class="msg-ava" src="${safeImg(m.senderProfilePic)}" onclick="goProfile('${ss}')" loading="lazy" alt="">`:''}
      <div class="msg-bwrap">
        <div class="msg-bubble${del?' msg-deleted':''}">
          ${del?'<span class="msg-text" style="font-style:italic;opacity:.6">🚫 Dihapus</span>':
            m.text?`<div class="msg-text">${escHtml(m.text)}</div>`:''}
          ${!del&&su?`<div class="msg-media">${m.mediaType==='image'?`<img src="${escHtml(su)}" onclick="safeOpen('${escHtml(su)}')" loading="lazy" alt="">`:m.mediaType==='video'?`<video src="${escHtml(su)}" controls preload="metadata"></video>`:m.mediaType==='audio'?`<audio src="${escHtml(su)}" controls style="width:100%;border-radius:8px"></audio>`:''}</div>`:''}
        </div>
        <div class="msg-meta">
          <span class="msg-time">${escHtml(fmtTime(m.createdAt))}</span>
          ${mine&&!del?`<span class="msg-tick${m.isRead?' read':''}">${m.isRead?'✓✓':'✓'}</span>`:''}
          ${mine&&!del?`<button class="msg-del" onclick="delChatMsg('${sm}')">🗑</button>`:''}
        </div>
      </div>
    </div>`;
  });
  if(!html) html='<div style="text-align:center;padding:40px;color:var(--text-tertiary);font-size:14px">👋 Mulai percakapan!</div>';
  c.innerHTML=html;
  if(scroll||d.messages.length!==lastMsgCount) c.scrollTop=c.scrollHeight;
  updateChatBadge();
}
window.chatKey=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}};
window.handleChatMedia=async function(e){
  const f=e.target.files[0];if(!f)return;
  const err=validateFile(f,[...MIME_IMG,...MIME_VID,...MIME_AUD],10);if(err){toast(err,'error');e.target.value='';return;}
  const r=new FileReader();
  r.onload=ev=>{
    const ip=document.getElementById('chatPrevImg'),vp=document.getElementById('chatPrevVid');
    if(f.type.startsWith('image/')){ip.src=ev.target.result;ip.style.display='block';vp.style.display='none';}
    else if(f.type.startsWith('video/')){vp.src=ev.target.result;vp.style.display='block';ip.style.display='none';}
    else{ip.style.display='none';vp.style.display='none';}
    document.getElementById('chatMedPrev').style.display='inline-block';
  };r.readAsDataURL(f);
  const fd=new FormData();fd.append('media',f);
  showLoad();const res=await apiForm('/api/chat/upload-media',fd);hideLoad();
  if(res?.success)chatMediaFile={url:res.mediaUrl,type:res.mediaType};
  else{toast('Gagal upload media','error');removeChatMedia();}
};
window.removeChatMedia=function(){chatMediaFile=null;document.getElementById('chatMedPrev').style.display='none';document.getElementById('chatFileInp').value='';};
window.sendChat=async function(){
  if(!convId||isSubmitting)return;
  const inp=document.getElementById('chatInp'),t=inp.value.trim();
  if(!t&&!chatMediaFile)return;
  const btn=document.getElementById('chatSendBtn');
  isSubmitting=true;btn.disabled=true;
  const r=await api(`/api/chat/${convId}/send`,{method:'POST',body:JSON.stringify({text:t,mediaUrl:chatMediaFile?.url,mediaType:chatMediaFile?.type})});
  btn.disabled=false;isSubmitting=false;
  if(r?.success){inp.value='';inp.style.height='auto';removeChatMedia();chatMediaFile=null;lastMsgCount=0;await loadChatMsgs(true);}
  else toast('Gagal mengirim pesan','error');
};
window.delChatMsg=async function(mid){
  if(!confirm('Hapus pesan ini?'))return;
  const r=await api(`/api/chat/message/${mid}`,{method:'DELETE'});

};

  html+=`</div></div></div><div id="profilePostsGrid"></div></div>`;
  document.getElementById('main').innerHTML=html;
  const v=document.querySelector('.profile-wallpaper-video');if(v)v.play().catch(()=>{});
  const pd=await api(`/api/user/${uid}/posts`);hideLoad();
  if(pd?.posts){
    let ph=`<div class="glass" style="padding:16px"><div class="posts-grid">`;
    pd.posts.forEach(post=>{
      const su=safeUrl(post.mediaUrl)||'',sp=escHtml(post.id);
      ph+=`<div class="grid-item" onclick="showPostDetail('${sp}')">
        ${post.mediaType==='image'?`<img src="${escHtml(su)}" loading="lazy" alt="">`:`<video src="${escHtml(su)}" preload="metadata" muted playsinline></video>`}
        ${post.mediaArray?.length>1?`<div class="exp-badge">${post.mediaArray.length}</div>`:''}
      </div>`;
    });
    ph+='</div></div>';
    document.getElementById('profilePostsGrid').innerHTML=ph;
  }
}

async function showEditProfile(){
  document.getElementById('epBio').value=currentUser.bio||'';
  document.getElementById('epAva').src=safeImg(currentUser.profilePic);
  document.getElementById('bioCount').textContent=(currentUser.bio||'').length;
  document.getElementById('epBio').oninput=function(){document.getElementById('bioCount').textContent=Math.min(this.value.length,150);};
  wTempFile=null;await loadWallSettings();
  openModal('editProfileModal');
}
function initWallUI(){
  document.querySelectorAll('[data-wtab]').forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll('[data-wtab]').forEach(x=>x.classList.remove('active'));t.classList.add('active');
      wType=t.dataset.wtab;
      document.getElementById('wtabImage').style.display=wType==='image'?'block':'none';
      document.getElementById('wtabColor').style.display=wType==='color'?'block':'none';
      document.getElementById('wtabGradient').style.display=wType==='gradient'?'block':'none';
      updateWallPrev();
    };
  });
  document.querySelectorAll('.color-opt').forEach(o=>o.onclick=()=>{document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel');wValue=o.dataset.color;updateWallPrev();});
  document.getElementById('customColor').onchange=function(){document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('sel'));wValue=this.value;updateWallPrev();};
  document.querySelectorAll('.grad-opt').forEach(o=>o.onclick=()=>{document.querySelectorAll('.grad-opt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel');wValue=o.dataset.grad;updateWallPrev();});
  document.getElementById('wallFile').onchange=async function(e){
    const f=e.target.files[0];if(!f)return;
    const err=validateFile(f,[...MIME_IMG,...MIME_VID],20);if(err){toast(err,'error');e.target.value='';return;}
    wTempFile=f;
    const r=new FileReader();
    r.onload=ev=>{
      wValue=ev.target.result;wType='image';updateWallPrev();
      const wi=document.getElementById('wallFileImg'),wv=document.getElementById('wallFileVid');
      if(f.type.startsWith('image/')){wi.src=ev.target.result;wi.style.display='block';wv.style.display='none';}
      else{wv.src=ev.target.result;wv.style.display='block';wi.style.display='none';wv.play().catch(()=>{});}
      document.getElementById('wallFilePrev').style.display='block';
    };r.readAsDataURL(f);
  };
  document.getElementById('epAvaFile').onchange=function(e){
    if(e.target.files[0]){
      const err=validateFile(e.target.files[0],MIME_IMG,10);if(err){toast(err,'error');e.target.value='';return;}
      document.getElementById('epAva').src=URL.createObjectURL(e.target.files[0]);
    }
  };
}
function toggleBlur(){wBlur=!wBlur;document.getElementById('blurSw').classList.toggle('on',wBlur);updateWallPrev();}
function updateWallPrev(){
  const a=document.getElementById('wallPrev');if(!a)return;
  a.innerHTML='<div class="wall-prev-overlay"><span>Preview</span></div>';
  a.style.background='';a.style.filter='';a.style.transform='';
  const isVid=wType==='image'&&wValue&&(wTempFile?.type?.startsWith('video/')||wValue.endsWith('.mp4')||wValue.endsWith('.webm'));
  if(isVid){const v=document.createElement('video');v.src=wValue;v.autoplay=true;v.loop=true;v.muted=true;v.playsInline=true;v.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover';if(wBlur){v.style.filter='blur(8px)';v.style.transform='scale(1.05)';}a.appendChild(v);v.play().catch(()=>{});}
  else if(wType==='image'&&wValue){a.style.backgroundImage=`url('${wValue}')`;a.style.backgroundSize='cover';a.style.backgroundPosition='center';if(wBlur){a.style.filter='blur(8px)';a.style.transform='scale(1.05)';}}
  else if((wType==='color'||wType==='gradient')&&wValue){a.style.background=wValue;if(wBlur)a.style.filter='blur(8px)';}
  else a.style.background='linear-gradient(135deg,#0d0d3b,#1a0a2e)';
}
async function loadWallSettings(){
  const d=await api('/api/profile/wallpaper');
  if(d?.success&&d.settings){
    wType=d.settings.type||'image';wValue=d.settings.value||'';wBlur=d.settings.blur||false;
    document.getElementById('blurSw').classList.toggle('on',wBlur);
    document.querySelectorAll('[data-wtab]').forEach(t=>t.classList.toggle('active',t.dataset.wtab===wType));
    document.getElementById('wtabImage').style.display=wType==='image'?'block':'none';
    document.getElementById('wtabColor').style.display=wType==='color'?'block':'none';
    document.getElementById('wtabGradient').style.display=wType==='gradient'?'block':'none';
    if(wType==='color') document.querySelectorAll('.color-opt').forEach(o=>o.classList.toggle('sel',o.dataset.color===wValue));
    else if(wType==='gradient') document.querySelectorAll('.grad-opt').forEach(o=>o.classList.toggle('sel',o.dataset.grad===wValue));
    updateWallPrev();
  }
}
async function saveWallSettings(){
  let val=wValue;
  if(wTempFile&&wType==='image'){
    const fd=new FormData();fd.append('wallpaper',wTempFile);
    const r=await apiForm('/api/profile/upload-wallpaper',fd);
    if(r?.success)val=r.wallpaperUrl;else{toast('Gagal upload wallpaper','error');return false;}
  }
  return await api('/api/profile/wallpaper',{method:'POST',body:JSON.stringify({wallpaperType:wType,wallpaperValue:val,blur:wBlur})});
}
document.getElementById('saveProfileBtn').onclick=async()=>{
  if(isSubmitting)return;
  const bio=document.getElementById('epBio').value.substring(0,150);
  const pic=document.getElementById('epAvaFile').files[0];
  if(pic){const err=validateFile(pic,MIME_IMG,10);if(err){toast(err,'error');return;}}
  isSubmitting=true;showLoad();
  await api('/api/profile/update',{method:'POST',body:JSON.stringify({bio})});
  if(pic){const fd=new FormData();fd.append('profilePic',pic);await apiForm('/api/profile/upload-pic',fd);}
  await saveWallSettings();
  hideLoad();isSubmitting=false;
  await loadUser();
  if(currentView==='profile') renderProfile(currentUser.id);
  closeModal('editProfileModal');
  toast('Profil berhasil disimpan! ✨','success');
};

window.showAdminPanel=async function(){
  if(!currentUser?.isAdmin){toast('Akses ditolak!','error');return;}

};
document.querySelectorAll('[data-atab]').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('[data-atab]').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active'));

  if(!d?.stats){document.getElementById('adminStats').innerHTML='<div class="empty"><h3>Gagal</h3></div>';return;}
  const s=d.stats;
  document.getElementById('adminStatsGrid').innerHTML=`
    <div class="glass admin-card"><div class="admin-card-icon">👥</div><div class="admin-card-num">${s.totalUsers}</div><div class="admin-card-lbl">Total Users</div></div>
    <div class="glass admin-card"><div class="admin-card-icon">📷</div><div class="admin-card-num">${s.totalPosts}</div><div class="admin-card-lbl">Total Posts</div></div>
    <div class="glass admin-card"><div class="admin-card-icon">💬</div><div class="admin-card-num">${s.totalComments}</div><div class="admin-card-lbl">Komentar</div></div>
    <div class="glass admin-card"><div class="admin-card-icon">💌</div><div class="admin-card-num">${s.totalMessages||0}</div><div class="admin-card-lbl">Pesan Chat</div></div>`;
  document.getElementById('adminStats').innerHTML=`
    <div style="padding:0 0 14px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div style="padding:14px;border:1px solid var(--border-color);border-radius:16px;background:rgba(167,139,250,.06)"><span style="font-size:12px;color:var(--text-tertiary);font-weight:700">GAMBAR</span><div style="font-size:20px;font-weight:800;color:var(--text-primary);margin-top:4px">${s.totalImages||0}</div></div>
      <div style="padding:14px;border:1px solid var(--border-color);border-radius:16px;background:rgba(167,139,250,.06)"><span style="font-size:12px;color:var(--text-tertiary);font-weight:700">VIDEO</span><div style="font-size:20px;font-weight:800;color:var(--text-primary);margin-top:4px">${s.totalVideos||0}</div></div>
      <div style="padding:14px;border:1px solid var(--border-color);border-radius:16px;background:rgba(167,139,250,.06)"><span style="font-size:12px;color:var(--text-tertiary);font-weight:700">VERIFIED</span><div style="font-size:20px;font-weight:800;color:var(--text-primary);margin-top:4px">${s.totalVerified}</div></div>
      <div style="padding:14px;border:1px solid var(--border-color);border-radius:16px;background:rgba(167,139,250,.06)"><span style="font-size:12px;color:var(--text-tertiary);font-weight:700">DEVELOPER</span><div style="font-size:20px;font-weight:800;color:var(--text-primary);margin-top:4px">${s.totalAdmins}</div></div>
    </div></div>`;
}
async function loadAdminUsers(){
  document.getElementById('adminUsers').innerHTML='<div class="spin-wrap"><div class="spin-sm"></div>Loading...</div>';
  showLoad();const d=await api('/api/admin/users');hideLoad();
  if(!d?.users){document.getElementById('adminUsers').innerHTML='<div class="empty"><h3>Gagal</h3></div>';return;}
  let html='<div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>User</th><th>Lv</th><th>Post</th><th>IP</th><th>Aksi</th></tr></thead><tbody>';
  d.users.forEach(u=>{
    const self=u.id===currentUser.id;
    html+=`<tr><td><div class="admin-ucell"><img src="${safeImg(u.profilePic)}" alt="" loading="lazy"><strong>${escHtml(u.username)}</strong>${u.isVerified?'<span class="vbadge" style="width:14px;height:14px;font-size:9px">✓</span>':''}</div></td>
      <td>${u.level||1}</td><td>${u.posts||0}</td>
      <td style="font-size:10px;color:var(--text-tertiary)">${escHtml(u.registeredIp||'-')}</td>
      <td style="white-space:nowrap">
        <button class="admin-act av" onclick="adminVerify('${escHtml(u.id)}')">${u.isVerified?'✓Un':'✓Ver'}</button>
        <button class="admin-act ad" onclick="adminDev('${escHtml(u.id)}')">${u.isAdmin?'–Dev':'+Dev'}</button>
        <button class="admin-act bg" onclick="openAssignBadge('${escHtml(u.id)}')">🏷</button>
        ${!self?`<button class="admin-act dl" onclick="promptDel('${escHtml(u.id)}','${escHtml(u.username)}')">🗑</button>`:'<button class="admin-act" disabled style="opacity:.3">🗑</button>'}
      </td></tr>`;
  });
  html+='</tbody></table></div>';document.getElementById('adminUsers').innerHTML=html;
}
async function loadAdminPosts(){
  document.getElementById('adminPosts').innerHTML='<div class="spin-wrap"><div class="spin-sm"></div>Loading...</div>';
  showLoad();const d=await api('/api/admin/posts');hideLoad();
  if(!d?.posts){document.getElementById('adminPosts').innerHTML='<div class="empty"><h3>Gagal</h3></div>';return;}
  let html='';
  d.posts.forEach(p=>{const su=safeUrl(p.mediaUrl)||'';html+=`<div class="admin-post-item"><div class="admin-thumb">${p.mediaType==='image'?`<img src="${escHtml(su)}" alt="" loading="lazy">`:`<video src="${escHtml(su)}" muted></video>`}</div><div class="admin-post-info"><strong>${escHtml(p.username)}</strong><div>${escHtml(p.caption?.substring(0,30)||'')}</div></div><button class="admin-del-btn" onclick="adminDelPost('${escHtml(p.id)}')">×</button></div>`;});
  document.getElementById('adminPosts').innerHTML=html||'<div class="empty"><h3>Tidak ada post</h3></div>';
}
async function loadAdminBadges(){
  document.getElementById('adminBadges').innerHTML='<div class="spin-wrap"><div class="spin-sm"></div>Loading...</div>';
  showLoad();const d=await api('/api/admin/badges');hideLoad();
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h4 style="color:var(--text-primary);font-size:16px">🏷️ Custom Badges</h4><button class="btn btn-success btn-sm" onclick="openAssignBadge()">➕ Buat</button></div><div class="badge-list">`;
  if(!d?.badges?.length) html+='<div class="empty"><p>Belum ada badge</p></div>';
  else d.badges.forEach(b=>{html+=`<div class="badge-card-item"><div style="display:flex;align-items:center;gap:12px"><div class="badge-icon-big">${escHtml(b.icon)}</div><div><div style="font-weight:700;color:var(--text-primary)">${escHtml(b.name)}</div><div style="font-size:12px;color:var(--accent);margin-top:2px">👤 ${escHtml(b.username||b.userId)}</div></div></div><button class="admin-del-btn" onclick="adminDelBadge('${escHtml(b.userId)}','${escHtml(b.name)}')">×</button></div>`;});
  html+='</div>';document.getElementById('adminBadges').innerHTML=html;
}
window.adminVerify=async function(uid){
  const d=await api('/api/admin/users');const u=d?.users?.find(x=>x.id===uid);
  if(!confirm(u?.isVerified?'Cabut verifikasi?':'Verifikasi user ini?'))return;
  showLoad();await api(`/api/admin/${u?.isVerified?'unverify':'verify'}/${uid}`,{method:'POST'});hideLoad();
  loadAdminUsers();toast('Berhasil!','success');
};
window.adminDev=async function(uid){
  const d=await api('/api/admin/users');const u=d?.users?.find(x=>x.id===uid);
  if(!confirm(u?.isAdmin?'Cabut developer?':'Jadikan developer?'))return;
  showLoad();await api(`/api/admin/${u?.isAdmin?'remove-admin':'make-admin'}/${uid}`,{method:'POST'});hideLoad();
  loadAdminUsers();toast('Berhasil!','success');
};
window.adminDelPost=async function(pid){if(!confirm('Hapus postingan?'))return;showLoad();await api(`/api/admin/post/${pid}`,{method:'DELETE'});hideLoad();loadAdminPosts();if(currentView==='feed')renderFeed();};
window.adminDelBadge=async function(uid,name){if(!confirm(`Hapus badge "${name}"?`))return;showLoad();const r=await api('/api/admin/remove-badge',{method:'POST',body:JSON.stringify({userId:uid,badgeName:name})});hideLoad();if(r?.success){toast('Badge dihapus!','success');loadAdminBadges();}};
window.openAssignBadge=function(uid=''){
  document.getElementById('badgeUserId').value=uid;
  document.getElementById('badgeName').value='';
  document.getElementById('badgeIcon').value='🏷️';
  updateBadgePrev();
  openModal('assignBadgeModal');
};
function updateBadgePrev(){
  const n=document.getElementById('badgeName').value||'Nama Badge';
  const ic=document.getElementById('badgeIcon').value||'🏷️';
  const col=document.getElementById('badgeColor').value;
  const el=document.getElementById('badgePrevChip');
  el.textContent=`${ic} ${n}`;el.style.background=`${col}20`;el.style.color=col;el.style.border=`1px solid ${col}`;
}
document.getElementById('badgeName').oninput=updateBadgePrev;
document.getElementById('badgeIcon').oninput=updateBadgePrev;
document.getElementById('badgeColor').onchange=updateBadgePrev;
document.getElementById('confirmBadgeBtn').onclick=async()=>{
  const uid=document.getElementById('badgeUserId').value.trim();
  const name=document.getElementById('badgeName').value.trim();
  const icon=document.getElementById('badgeIcon').value.trim();
  const color=document.getElementById('badgeColor').value;
  if(!uid||!name){toast('User ID dan nama badge wajib!','warning');return;}
  if(isSubmitting)return;isSubmitting=true;showLoad();
  const r=await api('/api/admin/assign-badge',{method:'POST',body:JSON.stringify({userId:uid,badgeName:name,badgeIcon:icon,badgeColor:color})});
  hideLoad();isSubmitting=false;
  if(r?.success){toast('Badge berhasil di-assign! 🎖️','success');closeModal('assignBadgeModal');loadAdminBadges();}
  else toast(r?.error||'Gagal','error');
};
window.promptDel=function(uid,uname){

};
document.getElementById('confirmDelUserBtn').onclick=async()=>{
  const uid=document.getElementById('delUserId').value;
  if(!uid||isSubmitting)return;
  closeModal('deleteUserModal');isSubmitting=true;showLoad();

  if(r?.success){toast('✅ '+r.message,'success');loadAdminUsers();}
  else toast('❌ '+(r?.error||'Gagal'),'error');
};
